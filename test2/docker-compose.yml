version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15674:15674"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - ./message.conf:/etc/rabbitmq/rabbitmq.conf

  web1:
    image: nginx:alpine
    container_name: web1-rabbitmq
    ports:
      - "3001:80"
    volumes:
      - ./src/web1:/usr/share/nginx/html

  web2:
    image: nginx:alpine
    container_name: web2-rabbitmq
    ports:
      - "3002:80"
    volumes:
      - ./src/web2:/usr/share/nginx/html