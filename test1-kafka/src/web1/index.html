<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kafka Web1 — Продюсер</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; color: #00d4aa; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
    .badge {
      background: #00d4aa22;
      color: #00d4aa;
      border: 1px solid #00d4aa44;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-bottom: 30px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input, textarea {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #00d4aa; }
    textarea { height: 80px; resize: vertical; }
    button {
      width: 100%;
      padding: 12px;
      background: #00d4aa;
      color: #0f0f1a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #00b894; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    .log {
      width: 100%;
      max-width: 560px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 16px;
      max-height: 260px;
      overflow-y: auto;
    }
    .log h2 {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .log-entry {
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      border-left: 3px solid transparent;
    }
    .log-entry.success { background: #00d4aa11; border-color: #00d4aa; color: #00d4aa; }
    .log-entry.error   { background: #ff4d4d11; border-color: #ff4d4d; color: #ff4d4d; }
    .log-entry.info    { background: #4d9fff11; border-color: #4d9fff; color: #4d9fff; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4d4d;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.online { background: #00d4aa; }
  </style>
</head>
<body>
  <h1>⚡ Kafka Продюсер</h1>
  <p class="subtitle">Web1 — Надсилає повідомлення до Kafka</p>
  <span class="badge">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Перевірка...</span>
  </span>
  <div class="card">
    <h2>📤 Надіслати повідомлення</h2>
    <input id="topicInput" type="text" placeholder="Топік" value="chat-messages" />
    <input id="keyInput" type="text" placeholder="Ключ (необов'язково)" value="web1" />
    <textarea id="messageInput" placeholder="Текст повідомлення...">Привіт від Web1!</textarea>
    <button id="sendBtn" onclick="sendMessage()">Надіслати до Kafka</button>
  </div>
  <div class="log">
    <h2>📋 Журнал подій</h2>
    <div id="logContainer"></div>
  </div>
  <script>
    const KAFKA_REST = 'http://localhost:8082';

    function log(msg, type = 'info') {
      const container = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      container.prepend(entry);
    }

    async function checkStatus() {
      try {
        const res = await fetch(`${KAFKA_REST}/topics`);
        if (res.ok) {
          document.getElementById('statusDot').classList.add('online');
          document.getElementById('statusText').textContent = 'Kafka підключено';
          log('Підключено до Kafka REST API', 'success');
        }
      } catch {
        document.getElementById('statusText').textContent = 'Kafka недоступна';
        log('Не вдається підключитись — чи запущений Docker?', 'error');
      }
    }

    async function sendMessage() {
      const topic   = document.getElementById('topicInput').value.trim();
      const key     = document.getElementById('keyInput').value.trim();
      const message = document.getElementById('messageInput').value.trim();
      const btn     = document.getElementById('sendBtn');

      if (!topic || !message) {
        log('Топік та повідомлення обовязкові!', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Надсилання...';

      try {
        const res = await fetch(`${KAFKA_REST}/topics/${topic}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/vnd.kafka.json.v2+json',
            'Accept': 'application/vnd.kafka.v2+json'
          },
          body: JSON.stringify({
            records: [{ key: key || null, value: message }]
          })
        });

        const data = await res.json();
        if (res.ok) {
          log(`✓ Надіслано до "${topic}" | "${message}"`, 'success');
        } else {
          log(`✗ Помилка: ${JSON.stringify(data)}`, 'error');
        }
      } catch (err) {
        log(`✗ Помилка мережі: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Надіслати до Kafka';
      }
    }

    document.getElementById('messageInput').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
